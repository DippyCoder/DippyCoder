name: Update README

on:
  schedule:
    - cron: "0 4 * * *"   # runs daily at 04:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch most recently updated repo and patch README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re, subprocess, os

          token = os.environ["GH_TOKEN"]
          username = "DippyCoder"

          # Repos to skip (e.g. the profile repo itself, forks, archived)
          SKIP = {username.lower()}

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def gh(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Fetch repos sorted by push date, public only
          repos = gh(f"https://api.github.com/users/{username}/repos?per_page=100&sort=pushed&type=owner")

          # Pick first non-skipped, non-fork, non-archived repo
          target = None
          for repo in repos:
              if repo["fork"] or repo["archived"]:
                  continue
              if repo["name"].lower() in SKIP:
                  continue
              target = repo
              break

          if not target:
              print("No eligible repo found — skipping update")
              exit(0)

          name = target["name"]
          url  = target["html_url"]
          print(f"Most recently active repo: {name} ({url})")

          with open("README.md", "r") as f:
              content = f.read()

          # Replace the "Currently working on:" line
          new_line = f"- **Currently working on:** [{name}]({url})."
          updated = re.sub(
              r"- \*\*Currently working on:\*\*.*",
              new_line,
              content
          )

          if updated == content:
              print("README already up to date")
              exit(0)

          with open("README.md", "w") as f:
              f.write(updated)

          print("README updated successfully")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: auto-update currently working on [skip ci]"
          git push
